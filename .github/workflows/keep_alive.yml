name: Keep Render App Awake

on:
  schedule:
    # Runs every minute (Note: GitHub Actions enforces a minimum interval of 5 minutes)
    - cron: '* * * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          # The -L flag follows redirects (like to the login page)
          # Replace 'your-app-name' with your actual Render URL
          curl -I -s -L https://co-fi-app.onrender.com > /dev/null
          echo "Pinged successfully"
