databases:
  - name: co-fi-db
    databaseName: cofi
    user: cofi_user
    plan: free

services:
  - type: web
    name: co-fi-app
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn finance_manager.wsgi --workers 2 --threads 4 --timeout 60 --bind 0.0.0.0:$PORT --log-level info"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: co-fi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://co-fi-app.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
